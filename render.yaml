services:
  - type: web
    name: portfolio-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: sh scripts/start.sh
    envVars:
      - key: APP_VERSION
        value: 0.1.0
      - key: CORS_ORIGINS
        value: https://ankojh.com,https://www.ankojh.com
      - key: OPENAI_ANSWER_MODEL
        value: gpt-5-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: OPENAI_EMBEDDING_DIMENSIONS
        value: 1536
      - key: KNOWLEDGE_DIR
        value: knowledge
      - key: RAG_TOP_K
        value: 4
      - key: ASK_RATE_LIMIT_COUNT
        value: 12
      - key: ASK_RATE_LIMIT_WINDOW_MINUTES
        value: 30
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
